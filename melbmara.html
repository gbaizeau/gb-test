<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melbourne 2026 Marathon Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .bg-teal-50 { background-color: #f0fdfa; } 
        .today-run-highlight { border-left: 4px solid #14b8a6; background-color: #f0fdfa !important; }
        .week-header { cursor: pointer; transition: all 0.2s; }
        .week-header:hover { background-color: #f8fafc; }
        .rest-day-row { opacity: 0.25; filter: grayscale(1); background-color: #f8fafc; }
        .comment-item { animation: fadeIn 0.3s ease; border-left: 2px solid #2dd4bf; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #14b8a6; }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-slate-200 z-50 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-6">
            <h1 class="text-xl font-black tracking-tighter text-teal-600">MELB '26</h1>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="switchProfile('mimi')" id="btn-mimi" class="px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white shadow-sm text-teal-600">Mimi</button>
                <button onclick="switchProfile('gregou')" id="btn-gregou" class="px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500">Gregou</button>
            </div>
        </div>
        <div id="auth-container" class="flex items-center space-x-4">
            <div id="user-info" class="hidden flex items-center space-x-3">
                <span id="user-name" class="text-sm font-bold text-slate-700"></span>
                <button id="signout-btn" onclick="handleSignOut()" class="text-[10px] bg-slate-100 px-2 py-1 rounded-md text-slate-400 font-bold uppercase hover:bg-red-50 hover:text-red-500 transition-all">Sign Out</button>
            </div>
            <button id="google-signin-btn" onclick="handleSignIn()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-100">Sign in</button>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8 mt-24">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="space-y-6">
                <section class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                    <div id="countdown" class="text-6xl font-black text-teal-600 tracking-tighter">--</div>
                    <p class="text-[10px] text-slate-400 font-black uppercase mt-2 tracking-widest text-center">Days to Melbourne</p>
                </section>
                <section class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest text-center">Activity Inbox</h2>
                    <div id="strava-inbox" class="space-y-3">
                        <p class="text-xs text-slate-300 italic text-center">Sign in to see runs</p>
                    </div>
                </section>
            </aside>

            <div class="lg:col-span-2 space-y-6">
                <section class="bg-white p-4 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
                    <div class="mb-8 flex justify-between items-center">
                        <div>
                            <h2 class="text-4xl font-black text-slate-900 tracking-tighter" id="display-name">Mimi's Plan</h2>
                            <p class="text-teal-600 text-[10px] font-black mt-1 uppercase tracking-widest">Target: Oct 11, 2026</p>
                        </div>
                        <div class="flex items-center space-x-3 bg-slate-50 px-4 py-2 rounded-2xl border border-slate-100">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Hide Rest</span>
                            <label class="switch">
                                <input type="checkbox" id="hide-rest-toggle" checked onchange="window.renderPlan()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div id="plan-container" class="space-y-6">
                        <p class="text-center text-slate-400 italic py-10">Initializing Plan...</p>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.7/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, collection, query, where, arrayUnion } from "https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.7/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAscCQCTKwszBKcHlaJB5Zgm0X_dOUPw5Y",
            authDomain: "melbmara2026.firebaseapp.com",
            projectId: "melbmara2026",
            storageBucket: "melbmara2026.firebasestorage.app",
            messagingSenderId: "968047511570",
            appId: "1:968047511570:web:367e6129673359b61430cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const planStartDate = new Date("2026-07-20T00:00:00");
        const raceDate = new Date("2026-10-11T08:00:00");

        let activeUser = "mimi";
        let trainingPlanData = []; 
        let runLogData = {};
        let expandedWeeks = new Set();

        const currentWeekNum = Math.max(1, Math.min(12, Math.floor((new Date() - planStartDate) / (7 * 864e5)) + 1));
        expandedWeeks.add(currentWeekNum);

        // --- ATTACHED TO WINDOW FOR HTML ACCESSIBILITY ---

        window.renderPlan = () => {
            const container = document.getElementById('plan-container');
            if (!container) return;
            const hideRest = document.getElementById('hide-rest-toggle')?.checked || false;
            container.innerHTML = '';

            trainingPlanData.forEach((week) => {
                const isExpanded = expandedWeeks.has(week.week);
                const weekDiv = document.createElement('div');
                weekDiv.className = `week-container rounded-[1.5rem] border border-slate-100 overflow-hidden transition-all ${isExpanded ? 'bg-white shadow-md' : 'bg-slate-50 opacity-60'}`;
                
                weekDiv.innerHTML = `
                    <div class="week-header p-5 flex justify-between items-center bg-white" onclick="window.toggleWeek(${week.week})">
                        <div class="flex items-center space-x-5">
                            <div class="flex flex-col">
                                <span class="font-black text-slate-300 uppercase text-[9px] tracking-widest leading-none">Week ${week.week}</span>
                                <span class="text-lg font-black text-slate-900 mt-1">${week.totalKm || 0} <span class="text-slate-300 font-bold text-[10px] uppercase">KM Total</span></span>
                            </div>
                            ${week.week === currentWeekNum ? '<span class="bg-teal-500 text-white text-[8px] font-black px-2 py-1 rounded-md uppercase tracking-tighter">Current</span>' : ''}
                        </div>
                        <span class="text-[10px] font-black text-slate-400 uppercase">${isExpanded ? 'Collapse' : 'Expand'}</span>
                    </div>
                    <div class="week-content ${isExpanded ? '' : 'hidden'} border-t border-slate-50">
                        <table class="w-full text-left text-sm"><tbody id="week-body-${week.week}"></tbody></table>
                    </div>
                `;
                
                const tbody = weekDiv.querySelector('tbody');
                const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

                days.forEach((day, dIdx) => {
                    const workout = week[day] || "Rest";
                    const isRest = workout.toLowerCase() === 'rest';
                    if (hideRest && isRest) return;

                    const runId = `w${week.week}d${dIdx}`;
                    const log = runLogData[runId] || { status: 'pending', comments: [] };
                    const tr = document.createElement('tr');
                    tr.className = `border-b border-slate-50 ${isRest ? 'rest-day-row' : ''}`;
                    
                    tr.innerHTML = `
                        <td class="p-6 w-24 align-top">
                            <p class="text-[10px] font-black text-slate-300 uppercase leading-none">${day}</p>
                            <p class="text-xs font-bold text-slate-600">${new Date(planStartDate.getTime() + ((week.week - 1) * 7 + dIdx) * 864e5).toLocaleDateString('en-AU', {day:'numeric', month:'short'})}</p>
                        </td>
                        <td class="p-6 align-top">
                            <div class="flex flex-col">
                                <span class="text-base font-bold text-slate-800">${workout}</span>
                                <p class="text-xs text-slate-500 mt-1 font-medium">${week[day+'_Detail'] || ''}</p>
                                ${!isRest ? `
                                    <div class="mt-4 space-y-2">
                                        <div class="space-y-1.5">${(log.comments || []).map(c => `<div class="comment-item text-[11px] bg-slate-50 p-2.5 rounded-xl border border-slate-100"><span class="font-black text-teal-600 uppercase text-[9px] mr-1">${c.user}:</span><span class="text-slate-600 font-medium">${c.text}</span></div>`).join('')}</div>
                                        <div class="flex mt-3 shadow-sm rounded-xl overflow-hidden border border-slate-100">
                                            <input type="text" id="input-${runId}" placeholder="Note..." class="bg-white border-none text-[11px] px-4 py-2 w-full focus:ring-0">
                                            <button onclick="window.postComment('${runId}')" class="bg-slate-900 text-white px-4 text-[10px] font-black uppercase tracking-widest">Post</button>
                                        </div>
                                    </div>` : ''}
                            </div>
                        </td>
                        <td class="p-6 text-right align-top">
                            ${!isRest ? `<button class="bg-white border border-slate-200 px-4 py-1.5 rounded-xl text-[10px] font-black text-slate-400 uppercase tracking-tighter hover:text-teal-600 transition-all">Match</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                if (tbody.children.length > 0) container.appendChild(weekDiv);
            });
        };

        window.switchProfile = (name) => {
            activeUser = name;
            document.getElementById('display-name').innerText = name.charAt(0).toUpperCase() + name.slice(1) + "'s Plan";
            document.getElementById('btn-mimi').className = name === 'mimi' ? 'px-6 py-1.5 rounded-lg text-sm font-semibold bg-white shadow-sm text-teal-600' : 'px-6 py-1.5 rounded-lg text-sm font-semibold text-slate-500';
            document.getElementById('btn-gregou').className = name === 'gregou' ? 'px-6 py-1.5 rounded-lg text-sm font-semibold bg-white shadow-sm text-teal-600' : 'px-6 py-1.5 rounded-lg text-sm font-semibold text-slate-500';
            initSync();
        };

        window.toggleWeek = (num) => {
            if (expandedWeeks.has(num)) expandedWeeks.delete(num);
            else expandedWeeks.add(num);
            window.renderPlan();
        };

        window.postComment = async (runId) => {
            const input = document.getElementById(`input-${runId}`);
            if (!input?.value || !auth.currentUser) return;
            await setDoc(doc(db, `users/${activeUser}`, "runLogs", runId), {
                comments: arrayUnion({ user: auth.currentUser.displayName.split(' ')[0], text: input.value, ts: Date.now() })
            }, { merge: true });
            input.value = '';
        };

        window.handleSignIn = () => signInWithRedirect(auth, provider);
        window.handleSignOut = () => signOut(auth);

        // --- INTERNAL LOGIC ---

        function initSync() {
            onSnapshot(collection(db, `users/${activeUser}`, "planData"), (snap) => {
                trainingPlanData = [];
                snap.forEach(d => trainingPlanData.push({ week: parseInt(d.id.replace('week','')), ...d.data() }));
                trainingPlanData.sort((a, b) => a.week - b.week);
                window.renderPlan();
            });
            onSnapshot(collection(db, `users/${activeUser}`, "runLogs"), (snap) => {
                runLogData = {};
                snap.forEach(d => runLogData[d.id] = d.data());
                window.renderPlan();
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('google-signin-btn').classList.add('hidden');
                initSync();
            } else {
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('google-signin-btn').classList.remove('hidden');
            }
        });

        getRedirectResult(auth).catch(e => console.error(e));

        setInterval(() => {
            const diff = raceDate - new Date();
            document.getElementById('countdown').innerText = Math.max(0, Math.floor(diff / 864e5));
        }, 1000);
    </script>
</body>
</html>
