<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melbourne 2026 Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        
        /* Color Coding */
        .matched-row { background-color: #ecfdf5 !important; border-left: 4px solid #10b981 !important; } /* Emerald/Green */
        .pending-row { background-color: #f0f9ff !important; border-left: 4px solid #0ea5e9 !important; } /* Sky/Blue */
        
        .week-header { cursor: pointer; transition: all 0.2s; }
        .rest-day-row { opacity: 0.25; filter: grayscale(1); background-color: #f8fafc; }
        .comment-item { animation: fadeIn 0.3s ease; border-left: 2px solid #2dd4bf; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        #match-modal { transition: opacity 0.3s ease; }
        .modal-card { transform: scale(0.95); transition: transform 0.3s ease; }
        #match-modal.active { display: flex !important; opacity: 1; }
        #match-modal.active .modal-card { transform: scale(1); }

        /* Progress Map */
        .map-track { position: relative; width: 100%; height: 80px; background: #f1f5f9; border-radius: 40px; border: 2px solid #e2e8f0; margin: 20px 0; }
        .avatar-marker { position: absolute; transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); z-index: 10; }
        #marker-mimi { top: -22px; } 
        #marker-gregou { bottom: -22px; }
        .avatar-bubble { background: white; border-radius: 50%; padding: 4px; border: 3px solid; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="match-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="modal-card bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden p-8">
            <h3 class="text-2xl font-black tracking-tighter text-slate-900 mb-2">Select Activity</h3>
            <p id="modal-workout-info" class="text-xs font-bold text-sky-600 uppercase tracking-widest mb-6"></p>
            <div id="modal-run-list" class="space-y-3 max-h-[40vh] overflow-y-auto mb-8 pr-2"></div>
            <button onclick="window.closeMatchModal()" class="w-full bg-slate-100 text-slate-400 py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Cancel</button>
        </div>
    </div>

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-slate-200 z-50 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-6">
            <h1 class="text-xl font-black tracking-tighter text-teal-600">MELB '26</h1>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="switchProfile('mimi')" id="btn-mimi" class="px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white shadow-sm text-teal-600">Mimi</button>
                <button onclick="switchProfile('gregou')" id="btn-gregou" class="px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500">Gregou</button>
            </div>
        </div>
        <div id="auth-container" class="flex items-center space-x-4">
            <div id="user-info" class="hidden flex items-center space-x-3">
                <span id="user-name" class="text-sm font-bold text-slate-700"></span>
                <button id="signout-btn" onclick="handleSignOut()" class="text-[10px] bg-slate-100 px-2 py-1 rounded-md text-slate-400 font-bold uppercase">Sign Out</button>
            </div>
            <button id="google-signin-btn" onclick="handleSignIn()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg">Sign in</button>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8 mt-24">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="space-y-6">
                <section class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                    <div id="countdown" class="text-6xl font-black text-teal-600 tracking-tighter">--</div>
                    <p class="text-[10px] text-slate-400 font-black uppercase mt-2 tracking-widest text-center">Days to Melbourne</p>
                </section>
                
                <section class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest text-center">Activity Inbox</h2>
                    <div id="strava-inbox" class="space-y-3"></div>
                </section>
            </aside>

            <div class="lg:col-span-2 space-y-6">
                <section class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                    <h2 class="text-xs font-black text-slate-400 uppercase mb-12 tracking-widest text-
