<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melbourne 2026 Marathon Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏃‍♂️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chart-container { position: relative; width: 100%; height: 300px; }
        .bg-teal-50 { background-color: #f0fdfa; } 
        .today-run-highlight { border-left: 4px solid #2dd4bf; background-color: #ccfbf1 !important; }
        .strava-card { transition: all 0.2s ease; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 1rem; background: white; }
        .strava-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .run-details-collapsible { display: none; padding-top: 0.5rem; }
        .run-details-collapsible.expanded { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="fixed top-0 w-full bg-white border-b border-slate-200 z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-6">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Melbourne 2026 Hub</h1>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="switchProfile('mimi')" id="btn-mimi" class="px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white shadow-sm text-teal-600">Mimi</button>
                <button onclick="switchProfile('gregou')" id="btn-gregou" class="px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500">Gregou</button>
            </div>
        </div>
        <div id="auth-container">
            <button id="google-signin-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-bold transition-colors">Sign in</button>
            <div id="user-info" class="hidden flex items-center space-x-4">
                <span id="user-name" class="text-sm font-semibold text-slate-700"></span>
                <button id="signout-btn" class="text-xs text-red-500 font-black uppercase tracking-tighter hover:text-red-700">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8 mt-24">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <aside class="space-y-8">
                <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center text-slate-800">
                        <span class="mr-2">📥</span> Strava Matcher
                    </h2>
                    <div id="strava-inbox" class="space-y-4">
                        <p class="text-sm text-slate-400 italic">Sign in to see unmatched runs.</p>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-1">Race Countdown</h2>
                    <div id="countdown" class="text-4xl font-black text-teal-600">-- Days</div>
                    <p class="text-xs text-slate-500 mt-2 font-medium">October 11, 2026</p>
                </section>
            </aside>

            <div class="lg:col-span-2">
                <section class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                    <div class="mb-8">
                        <h2 class="text-3xl font-black text-slate-900" id="display-name">Mimi's Training Plan</h2>
                        <div class="flex items-center space-x-2 mt-1">
                            <span class="bg-teal-100 text-teal-700 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">Sub-4h00 Goal</span>
                            <span class="text-slate-400 text-sm font-medium">Melbourne Marathon 2026</span>
                        </div>
                    </div>
                    <div id="plan-container" class="overflow-x-auto"></div>
                </section>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.7/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.7/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAscCQCTKwszBKcHlaJB5Zgm0X_dOUPw5Y",
            authDomain: "melbmara2026.firebaseapp.com",
            projectId: "melbmara2026",
            storageBucket: "melbmara2026.firebasestorage.app",
            messagingSenderId: "968047511570",
            appId: "1:968047511570:web:367e6129673359b61430cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const planStartDate = new Date("2026-07-20T00:00:00");
        const raceDate = new Date("2026-10-11T08:00:00");

        let activeUser = "mimi";
        let runLogData = {};
        let stravaInboxData = [];

        // FULL 12-WEEK TRAINING DATA
        const trainingPlanData = [
            { week: 1, totalKm: 32, mon: "Rest", tue: "ER 8km + 4 Strides", wed: "Rest", thu: "TR: 2km WU, 4km @ 5:20, 2km CD", fri: "Rest", sat: "LR 16km", sun: "Rest", motivation: "Welcome to the first step." },
            { week: 2, totalKm: 39, mon: "Rest", tue: "ER 10km", wed: "Rest", thu: "IT: 2km WU, 6x800m @ ~3:55, 2km CD", fri: "Rest", sat: "LR 18km", sun: "Rest", motivation: "Building the engine." },
            { week: 3, totalKm: 44, mon: "Rest", tue: "ER 10km + 4 Strides", wed: "Rest", thu: "MP: 2km WU, 8km @ 5:41, 2km CD", fri: "Rest", sat: "LR 22km", sun: "Rest", motivation: "Marathon pace focus." },
            { week: 4, totalKm: 37, mon: "Rest", tue: "ER 8km", wed: "Rest", thu: "TR: 2km WU, 5km @ 5:20, 2km CD", fri: "Rest", sat: "LR 20km", sun: "Rest", motivation: "Recovery week." },
            { week: 5, totalKm: 49, mon: "Rest", tue: "IT: 2km WU, 5x1km @ 5:05, 2km CD", wed: "Rest", thu: "ER 12km", fri: "Rest", sat: "LR 26km", sun: "Rest", motivation: "Increasing the load." },
            { week: 6, totalKm: 54, mon: "Rest", tue: "ER 10km", wed: "Rest", thu: "MP: 2km WU, 10km @ 5:41, 2km CD", fri: "Rest", sat: "LR 30km", sun: "Rest", motivation: "The 30km wall is a myth." },
            { week: 7, totalKm: 46, mon: "Rest", tue: "TR: 2km WU, 6km @ 5:20, 2km CD", wed: "Rest", thu: "ER 12km", fri: "Rest", sat: "LR 24km (w/ 8km MP)", sun: "Rest", motivation: "Endurance focus." },
            { week: 8, totalKm: 54, mon: "Rest", tue: "IT: 2km WU, 8x800m @ ~3:55, 2km CD", wed: "Rest", thu: "ER 10km", fri: "Rest", sat: "LR 32km", sun: "Rest", motivation: "Peak week volume!" },
            { week: 9, totalKm: 38, mon: "Rest", tue: "ER 8km", wed: "Rest", thu: "MP: 2km WU, 6km @ 5:41, 2km CD", fri: "Rest", sat: "LR 20km", sun: "Rest", motivation: "Taper phase begins." },
            { week: 10, totalKm: 32, mon: "Rest", tue: "IT: 2km WU, 4x800m @ ~3:55, 2km CD", wed: "Rest", thu: "ER 8km", fri: "Rest", sat: "LR 16km", sun: "Rest", motivation: "Keep the legs snappy." },
            { week: 11, totalKm: 21, mon: "Rest", tue: "ER 6km", wed: "Rest", thu: "ER 5km", fri: "Rest", sat: "LR 10km", sun: "Rest", motivation: "Final easy week." },
            { week: 12, totalKm: 12, mon: "Rest", tue: "ER 4km", wed: "Rest", thu: "ER 2km", fri: "Rest", sat: "RACE DAY! 🏁", sun: "", motivation: "Go sub-4:00!" }
        ];

        // LOGIC: Profile Switching
        window.switchProfile = (name) => {
            activeUser = name;
            document.getElementById('display-name').innerText = name.charAt(0).toUpperCase() + name.slice(1) + "'s Training Plan";
            document.getElementById('btn-mimi').className = name === 'mimi' ? 'px-6 py-1.5 rounded-lg text-sm font-semibold bg-white shadow-sm text-teal-600' : 'px-6 py-1.5 rounded-lg text-sm font-semibold text-slate-500';
            document.getElementById('btn-gregou').className = name === 'gregou' ? 'px-6 py-1.5 rounded-lg text-sm font-semibold bg-white shadow-sm text-teal-600' : 'px-6 py-1.5 rounded-lg text-sm font-semibold text-slate-500';
            initSync();
        };

        // FIREBASE: Real-time syncing
        function initSync() {
            const userRef = doc(db, "users", activeUser);
            
            // Sync Manual Logs
            onSnapshot(collection(db, "users", activeUser, "runLogs"), (snap) => {
                runLogData = {};
                snap.forEach(d => runLogData[d.id] = d.data());
                renderPlan();
            });

            // Sync Strava Inbox
            const inboxQuery = query(collection(db, "users", activeUser, "stravaInbox"), where("status", "==", "pending"));
            onSnapshot(inboxQuery, (snap) => {
                stravaInboxData = [];
                snap.forEach(d => stravaInboxData.push({ id: d.id, ...d.data() }));
                renderInbox();
            });
        }

        // SMART MATCHING & ACTIONS
        async function matchRun(runId, stravaId, distance, time) {
            await setDoc(doc(db, "users", activeUser, "runLogs", runId), {
                actualDistance: distance,
                actualTime: time,
                status: 'completed',
                stravaId: stravaId
            }, { merge: true });

            await updateDoc(doc(db, "users", activeUser, "stravaInbox", stravaId), { status: 'matched' });
        }

        async function discardRun(stravaId) {
            if(confirm("Discard this activity?")) {
                await updateDoc(doc(db, "users", activeUser, "stravaInbox", stravaId), { status: 'discarded' });
            }
        }

        // UI RENDERERS
        function renderPlan() {
            const container = document.getElementById('plan-container');
            container.innerHTML = '';
            const table = document.createElement('table');
            table.className = 'w-full text-left border-collapse text-sm';
            
            trainingPlanData.forEach((week, wIdx) => {
                const days = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
                days.forEach((day, dIdx) => {
                    const runId = `w${week.week}d${dIdx}`;
                    const log = runLogData[runId] || { status: 'pending' };
                    const tr = document.createElement('tr');
                    tr.className = `border-b border-slate-100 ${log.status === 'completed' ? 'bg-teal-50/30' : ''}`;
                    tr.innerHTML = `
                        <td class="py-4 px-2 font-bold text-slate-300 w-12">${dIdx === 0 ? week.week : ''}</td>
                        <td class="py-4 font-medium text-slate-400 w-24">${day.toUpperCase()}</td>
                        <td class="py-4">
                            <div class="flex items-center space-x-3">
                                <span class="h-2 w-2 rounded-full ${log.status === 'completed' ? 'bg-teal-500' : 'bg-slate-200'}"></span>
                                <span class="font-semibold ${log.status === 'completed' ? 'line-through text-slate-400' : 'text-slate-700'}">${week[day]}</span>
                            </div>
                            ${log.actualDistance ? `<p class="text-[10px] font-bold text-teal-600 ml-5 mt-1">Logged: ${log.actualDistance}km in ${log.actualTime}</p>` : ''}
                        </td>
                        <td class="py-4 text-right">
                             ${log.status === 'completed' ? '<span class="text-teal-600 font-bold">✓</span>' : `<button onclick="openMatchUI('${runId}')" class="text-[10px] uppercase font-black text-slate-400 hover:text-teal-600">Match</button>`}
                        </td>
                    `;
                    table.appendChild(tr);
                });
            });
            container.appendChild(table);
        }

        function renderInbox() {
            const container = document.getElementById('strava-inbox');
            if (stravaInboxData.length === 0) {
                container.innerHTML = '<p class="text-sm text-slate-400 italic">Everything matched! You\'re all caught up.</p>';
                return;
            }
            container.innerHTML = '';
            stravaInboxData.forEach(run => {
                const card = document.createElement('div');
                card.className = 'strava-card';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-black text-orange-500 uppercase">New Activity</span>
                        <button onclick="discardRun('${run.id}')" class="text-slate-300 hover:text-red-500">×</button>
                    </div>
                    <p class="text-sm font-bold text-slate-800">${run.distance}km @ ${run.date}</p>
                    <p class="text-[10px] text-slate-500 mb-3">Duration: ${run.time}</p>
                    <button onclick="matchBestFit('${run.id}', ${run.distance}, '${run.date}', '${run.time}')" class="w-full bg-slate-900 text-white text-[10px] font-bold py-2 rounded-lg hover:bg-teal-600 transition-colors">Assign to Plan</button>
                `;
                container.appendChild(card);
            });
        }

        window.matchBestFit = (stravaId, dist, date, time) => {
            // Find closest date in plan
            const runDate = new Date(date);
            const daysDiff = Math.floor((runDate - planStartDate) / 864e5);
            const w = Math.floor(daysDiff / 7) + 1;
            const d = daysDiff % 7;
            const runId = `w${w}d${d}`;
            
            if(confirm(`Match this ${dist}km run to Week ${w}, Day ${d+1}?`)) {
                matchRun(runId, stravaId, dist, time);
            }
        };

        // STARTUP
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('google-signin-btn').classList.add('hidden');
                initSync();
            } else {
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('google-signin-btn').classList.remove('hidden');
            }
        });

        document.getElementById('google-signin-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('signout-btn').onclick = () => signOut(auth);

        setInterval(() => {
            const diff = raceDate - new Date();
            document.getElementById('countdown').innerText = Math.floor(diff / 864e5) + " Days";
        }, 1000);

    </script>
</body>
</html>
